<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started & Download Buttons</title>

    <style>
        .get-started{
            background-color: rgb(121, 82, 179);
            color: white;
            border: none;
            border-radius: 5px;
            height: 40px;
            width: 125px;
            font-size: large;
            font-weight: bold;
            cursor: pointer;
            margin-right: 6px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .get-started:hover {
            opacity: 0.6;
        }

        .download{
            background-color: rgb(21, 94, 41);
            color: white;
            border-width: 1px;
            border-style: solid;
            border-radius:4px;
            border-color: rgb(108, 117, 125);
            height: 40px;
            width: 100px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .download:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="get-started">Get Stared</button>
    <button class="download">Download</button>
</body>
</html>
