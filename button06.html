<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>

    <style>
        .stretch-btn {
            background-color: green;
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 18px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            cursor: pointer;

            transition: padding-top 0.5s,
                padding-bottom 0.5s,
                padding-left 0.5s,
                padding-right 0.5s;
        }

        .stretch-btn:hover {
            padding-top: 18px;
            padding-bottom: 18px;
            padding-left: 36px;
            padding-right: 36px;
        }
    </style>
</head>
<body>
    <button class="stretch-btn">Stretch</button>
</body>
</html>
