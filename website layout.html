<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout</title>
</head>
<body>
    <div style="border-radius: 3px; border: none; background-color: #333; color: white; padding: 20px; text-align: center;"> <h1>My Website</h1></div>
    
    <div style="background-color: #666; color: white; padding: 20px; border-radius: 3px;">
        <span style="color: white; margin: 10px">Home</span>
        <span style="color: white; margin: 10px">Services</span>
        <span style="color: white; margin: 10px">Contact</span>

        <div style="display: flex;">
            <div style="background-color: #2e2d2d; width: 30%; padding: 20px; border-radius: 3px; margin-right: 20px;">
                <h3>Sidebar</h3>
                <p>Menu will be here</p>
            </div>

            <div style="background-color: #2e2d2d; border-radius: 3px; padding: 20px; width: 70%;">
                <h2>Main Content</h2>
                <p>This will contain the main content</p>
            </div>
        </div>
    </div>

    <div style="background-color: #777; color: white; padding: 10px; text-align: center; border-radius: 3px;">
        <p>2024 All rights reserved.</p>
    </div>
</body>
</html>
