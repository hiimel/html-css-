<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply & Save Button</title>

    <style>
        .apply-button {
            background-color: rgb(10, 102, 194);
            color: white;
            border: none;
            border-radius: 20px;
            height: 40px;
            width: 240px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-right: 10px;
            margin-left: 20px;
            transition: opacity 0.15s;
        }

        .apply-button:hover {
            opacity: 0.6;
        }

        .save-button {
            background-color: rgb(214, 208, 208);
            color: rgb(10, 102, 194);
            border-radius: 20px;
            border-width: 1px;
            border-style: solid;
            border-color: rgb(10, 102, 194);
            height: 20px;
            width: 55px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .save-button:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="apply-button">Apply on company website</button>
    <button class="save-button">Save</button>
</body>
</html>
