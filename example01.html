<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application of HTML & CSS</title>

    <style>
        .amazon-link {
            color: rgb(23, 88, 99);
        }

        .amazon-link:hover {
            color: rgb(0, 113, 133);
        }
        .title {
            font-size: 24px;
            font-weight: bold;
        }

        .price {
            color: rgb(0, 136, 0);
            font-weight: bold;
        }

        .add-to-cart-button {
            background-color: rgb(249, 217, 76);
            border: none;
            border-radius: 16px;
            height: 30px;
            width: 110px;
            margin-right: 8px;
            cursor: pointer;
        }

        .add-to-cart-button:hover {
            background-color: rgb(67, 5, 190);
        }

        .add-to-cart-button:active {
            opacity: 0.5;
        }

        .buy-now-button {
            background-color: rgb(255, 164, 28);
            border: none;
            height: 30px;
            width: 110px;
            border-radius: 16px;
            cursor: pointer;
        }

        .buy-now-button:hover {
            background-color: rgb(67, 5, 190);
        }

        .buy-now-button:active {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <a class="amazon-link" href="https://amazon.com">Back to Amazon</a>

    <p class="title">Nike Black Running Shoes</p>
    <p class="price">$39 - in shock.</p>
    <p>Free delivery tomorrow</p>

    <button class="add-to-cart-button">Add to cart</button>
    <button class="buy-now-button">Buy now</button>
</body>
</html>
