<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding Example</title>

    <style>
        body {
            background-color: purple;
        }

        .github-button {
            background-color: rgb(46, 164, 79);
            color: white;
            border: none;
            border-radius: 25px;
            height: 35px;
            width: 70px;
            padding-top: 7px;
            padding-bottom: 7px;
            padding-left: 14px;
            padding-right: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: box-shadow 0.15s;
            margin-right: 20px;
        }

        .github-button:hover {
            box-shadow: 0px 5px 8px rgb(8, 52, 21);
        }

        .amazon-button {
            height: 50px;
            width: 100px;
            border: none;
            border-radius: 25px;
            background-color: yellow;
            font-weight: bold;
            color: grey;
            padding-top: 7px;
            padding-bottom: 7px;
            padding-left: 10px;
            padding-right: 10px;
            cursor: pointer;
            transition: box-shadow 0.15s;
        }

        .amazon-button:hover {
            box-shadow: 0px 5px 8px rgb(57, 49, 5);
        }
    </style>
</head>
<body>
    <button class="github-button">Github</button>
    <button class="amazon-button">Add to cart</button>
</body>
</html>
