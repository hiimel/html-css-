<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Github</title>

    <style>
        .sign-in-with-github{
            background-color: black;
            color: white;
            height: 40px;
            width: 160px;
            border: none;
            border-radius: 2px;
            border-color: black;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.15s;

        }

        .sign-in-with-github:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="sign-in-with-github">Sign in with Github</button>
</body>
</html>
