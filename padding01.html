<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
    <style>
        body {
            background-color: purple;
        }

        .uber-button{
            background-color: black;
            color:aliceblue;   
            border: none;
            border-radius: 2px;
            height: 40px;
            width: 110px;
            cursor: pointer;
            transition: opacity 0.15s;
            font-weight: 10px;

            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 15px;
            padding-right: 15px;
        }

        .uber-button:hover {
            background-color: rgb(35, 222, 222);
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="uber-button">Request now</button>
</body>
</html>
