<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Button</title>

    <style>
        .amazon-button{
            background-color: rgb(255, 216, 20);
            border: none;
            height: 35px;
            width: 140px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .amazon-button:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <button class="amazon-button">Add to Cart</button>
</body>
</html>
